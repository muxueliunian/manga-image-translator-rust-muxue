name: Run cargo

env:
  CARGO_TERM_COLOR: always

inputs:
  name:
    required: true
  test:
    required: true
  os:
    required: true
  runs-on:
    required: true

runs:
  using: composite
  steps:
    - name: Check formatting
      shell: bash
      run: cargo fmt --all -- --check

    - name: Run tests
      if: inputs.test == true && inputs.runs-on == 'macos-latest'
      shell: bash
      run: cargo test --verbose

    - name: Build release
      if: inputs.runs-on == 'macos-latest' || inputs.runs-on == 'macos-13'
      shell: bash
      run: |
        export OPENCV_LINK_LIBS=opencv_core,opencv_imgproc
        cargo build --release -p simple-runtime
    - name: Build release
      if: inputs.runs-on != 'macos-latest' && inputs.runs-on != 'macos-13'
      shell: bash
      run: |
        cargo build --release -p simple-runtime

    - name: Symlink libcudnn.so to libcudnn.so.9 and export LD_LIBRARY_PATH
      if: ${{ inputs.runs-on == 'linux-x86_64' }}
      shell: bash
      run: |
        libfile=$(find target/release -type f -name 'libcudnn.so' | head -n1)

        if [ -n "$libfile" ]; then
          echo "Found libcudnn at $libfile"

          # Use /usr/local/lib since it's already in the default library search path
          sudo mkdir -p /usr/local/lib

          sudo ln -sf "$libfile" /usr/local/lib/libcudnn.so.9
          sudo ldconfig   # refresh the dynamic linker cache

          echo "✅ Linked libcudnn globally: /usr/local/lib/libcudnn.so.9"
        else
          echo "❌ libcudnn.so not found in target/release"
          exit 1
        fi
    - name: Prepare artifacts
      shell: bash
      run: |
        mkdir -p artifact

        cp target/release/simple-runtime artifact/ 2>/dev/null || true
        cp target/release/simple-runtime.exe artifact/ 2>/dev/null || true

        if [ -f target/release/simple-runtime ]; then
          case "${{ inputs.os }}" in
            linux)
              echo "Collecting dependencies with ldd..."
              ldd target/release/simple-runtime \
                | awk '{print $3}' \
                | grep '^/' \
                | while read -r lib; do
                    cp -u "$lib" artifact/ || true
                  done
              ;;
            macos)
              echo "Collecting dependencies with otool..."
              otool -L target/release/simple-runtime \
                | awk 'NR>1 {print $1}' \
                | grep '^/' \
                | while read -r lib; do
                    cp -u "$lib" artifact/ || true
                  done
              ;;
          esac
        fi

        if [ -f target/release/simple-runtime.exe ]; then
          echo "Collecting dependencies with dumpbin..."
          dumpbin //DEPENDENTS target/release/simple-runtime.exe \
            | grep '\.dll' \
            | while read -r dll; do
                found=$(which "$dll" 2>/dev/null || true)
                [ -z "$found" ] && found="$(find /c/Windows/System32 -iname "$dll" 2>/dev/null | head -n1)"
                [ -n "$found" ] && cp -u "$found" artifact/ || true
              done
        fi

        find target/release -maxdepth 1 -type f \
                  ! -name '.*' \
                  -name '*onnxruntime_providers*.so*' \
                  -exec cp -u {} artifact/ \; || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.name }}
        path: artifact
        retention-days: 5
        if-no-files-found: error
