name: Run cargo

env:
  CARGO_TERM_COLOR: always
  CARGO_TERM_PROGRESS: true
  CARGO_MESSAGE_FORMAT: human

inputs:
  name:
    required: true
  test:
    required: true
  os:
    required: true
  runs-on:
    required: true

runs:
  using: composite
  steps:
    - name: Check formatting
      shell: bash
      run: cargo fmt --all -- --check

    - name: Run tests
      if: inputs.test == true && inputs.runs-on == 'macos-latest'
      shell: bash
      run: cargo test --verbose

    - name: Build release
      if: inputs.runs-on == 'macos-latest' || inputs.runs-on == 'macos-13'
      shell: bash
      run: |
        export OPENCV_LINK_LIBS=opencv_core,opencv_imgproc
        cargo build --release -p simple-runtime
    - name: Build release
      if: inputs.runs-on != 'macos-latest' && inputs.runs-on != 'macos-13'
      shell: bash
      run: |
        cargo build --release -p simple-runtime -vv

    - name: Symlink libcudnn.so to libcudnn.so.9 and export LD_LIBRARY_PATH
      if: ${{ inputs.runs-on == 'linux-x86_64' }}
      shell: bash
      run: |
        libfile=$(find target/release -type f -name 'libcudnn.so' | head -n1)

        if [ -n "$libfile" ]; then
          echo "Found libcudnn at $libfile"

          # Use /usr/local/lib since it's already in the default library search path
          sudo mkdir -p /usr/local/lib
          sudo ln -sf "$libfile" /usr/local/lib/libcudnn.so
          sudo ln -sf "$libfile" /usr/local/lib/libcudnn.so.9
          sudo ldconfig   # refresh the dynamic linker cache

          echo "✅ Linked libcudnn globally: /usr/local/lib/libcudnn.so.9"
        else
          echo "❌ libcudnn.so not found in target/release"
          exit 1
        fi
    - name: Log files
      shell: bash
      run: |
        ls target/release
    - name: Prepare artifacts
      shell: bash
      run: |
        mkdir -p artifact

        cp target/release/simple-runtime artifact/ 2>/dev/null || true
        cp target/release/simple-runtime.exe artifact/ 2>/dev/null || true

        if [ -f target/release/simple-runtime ]; then
          case "${{ inputs.os }}" in
            linux)
              echo "Collecting dependencies with ldd..."
              export LD_LIBRARY_PATH="$LD_LIBRARY_PATH:$(pwd)/target/release"
              SYSTEM_LIBS_REGEX='^(libc\.so|libm\.so|libpthread\.so|librt\.so|libdl\.so|ld-linux|libgcc_s\.so)'
              copy_deps() {
                  local file="$1"
                  ldd "$file" | awk '{print $3}' | while read -r lib; do
                      if [ -n "$lib" ] && [ -f "$lib" ]; then
                        base=$(basename "$lib")
                        if [[ ! $base =~ $SYSTEM_LIBS_REGEX ]]; then
                            if [ ! -f "artifact/$base" ]; then
                                cp -u "$lib" artifact/
                                copy_deps "$lib"
                            fi
                        else
                            echo "⏩ Skipping system lib: $base"
                        fi
                      else
                          echo "⚠️ File not found: $lib"
                      fi
                  done
              }
              copy_deps target/release/simple-runtime
              ;;
            macos)
              echo "Collecting dependencies with otool..."
              export LD_LIBRARY_PATH="$LD_LIBRARY_PATH:$(pwd)/target/release"
              copy_deps_mac() {
                  local file="$1"
                  otool -L "$file" | awk 'NR>1 {print $1}' \
                      | grep -vE '^(/usr/lib|/System/Library/Frameworks)' \
                      | grep -v '^$' \
                      | while read -r lib; do
                          if [ -f "$lib" ]; then
                              if [ ! -f "artifact/$(basename "$lib")" ]; then
                                  cp -n "$lib" artifact/
                                  copy_deps_mac "$lib"  # recurse into this lib
                              fi
                          else
                              echo "⚠️ File not found: $lib"
                          fi
                      done
              }

              copy_deps_mac target/release/simple-runtime
              ;;
          esac
        fi

        if [ -f target/release/simple-runtime.exe ]; then
            echo "Collecting dependencies with dumpbin..."

            if [ ! -f "$DUMPBIN" ]; then
                echo "❌ dumpbin not found"
                exit 1
            fi
            "$DUMPBIN" //DEPENDENTS target/release/simple-runtime.exe \
                | grep '\.dll' \
                | tr -d '\r' \
                | while read -r dll; do
                    found="$(find target/release -maxdepth 1 -iname "$dll" 2>/dev/null || true)"

                    [ -z "$found" ] && found="$(which "$dll" 2>/dev/null || true)"

                    [ -z "$found" ] && found="$(find /c/Windows/System32 -iname "$dll" 2>/dev/null | head -n1)"

                    [ -z "$found" ] && found="$(find /c/tools/opencv -iname "$dll" 2>/dev/null | head -n1)"

                    if [ -n "$found" ]; then
                        cp -u "$found" artifact/ || true
                    else
                        echo "⚠️ DLL not found: $dll"
                    fi
                done
        fi

    - name: Copy ONNX Runtime providers
      shell: bash
      env:
        RUNNER_OS: ${{ inputs.os }}
      run: |
        case "$RUNNER_OS" in
          windows)
            pattern="onnxruntime_providers_*.dll"
            ;;
          macos)
            pattern="libonnxruntime_providers_*.dylib"
            ;;
          linux)
            pattern="libonnxruntime_providers_*.so"
            ;;
        esac

        find target/release -type f -name "$pattern" -exec cp {} artifact/ \; || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.name }}
        path: artifact
        retention-days: 5
        if-no-files-found: error
