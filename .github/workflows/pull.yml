name: Pull Request Validation

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        platform:
          - name: linux-x86_64
            runs-on: ubuntu-22.04
            os: linux
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            os: linux
          - name: macos-arm64
            runs-on: macos-latest
            os: macos
          - name: macos-x86_64
            runs-on: macos-13
            os: macos
          - name: windows-x86_64
            runs-on: windows-latest
            os: windows

    name: Setup on ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runs-on }}

    steps:
      - name: Setup Linux
        if: matrix.platform.name == 'linux-x86_64' || matrix.platform.name == 'linux-arm64'
        uses: ./.github/actions/setup-linux
        with:
          runs-on: ${{ matrix.platform.runs-on }}
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup macOS
        if: matrix.platform.name == 'macos-arm64' || matrix.platform.name == 'macos-x86_64'
        uses: ./.github/actions/setup-macos
        with:
          runs-on: ${{ matrix.platform.runs-on }}

      - name: Setup Windows
        if: matrix.platform.name == 'windows-x86_64'
        uses: ./.github/actions/setup-windows
        with:
          runs-on: ${{ matrix.platform.runs-on }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Tests & Building
        uses: ./.github/actions/cargo
        with:
          test: true
          runs-on: ${{ matrix.platform.runs-on }}
          name: ${{ matrix.platform.name }}
          os: ${{ matrix.platform.os }}
