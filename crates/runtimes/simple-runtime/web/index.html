<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manga Image Translator Rust</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [data-tip] { position: relative; }
    [data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      z-index: 30;
      left: 0;
      top: calc(100% + 6px);
      width: max-content;
      max-width: 320px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #111827;
      color: white;
      font-size: 12px;
      line-height: 1.45;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.18);
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-900">
  <main class="mx-auto min-h-screen max-w-5xl px-5 py-8">
    <section class="bg-white shadow-md">
      <div class="flex items-center justify-between border-b px-6 py-5">
        <h1 class="text-2xl font-semibold" data-i18n="title">图片/漫画翻译器 Rust</h1>
        <button id="langBtn" class="rounded border border-gray-300 px-4 py-2 text-sm hover:bg-gray-50">English</button>
      </div>

      <div class="space-y-6 px-6 py-6">
        <div class="grid gap-4 md:grid-cols-3">
          <label class="block">
            <span class="mb-1 block text-sm font-medium" data-tip="Detector: text area detection model. Paddle may detect stylized subtitles better, DBNet is usually faster." data-i18n="detector">检测器</span>
            <select id="detector" class="w-full border-b border-gray-300 bg-white px-2 py-2 outline-none focus:border-blue-500">
              <option>DBNet</option>
              <option>Paddle</option>
              <option>Ctd</option>
            </select>
          </label>
          <label class="block">
            <span class="mb-1 block text-sm font-medium" data-tip="OCR: recognizes text after detection. Ocr48px is the Rust default." data-i18n="ocr">OCR</span>
            <select id="ocr" class="w-full border-b border-gray-300 bg-white px-2 py-2 outline-none focus:border-blue-500">
              <option>Ocr48px</option>
              <option>MangaOcr</option>
              <option>Native</option>
              <option>Tesseract</option>
              <option>Ctc48px</option>
            </select>
          </label>
          <label class="block">
            <span class="mb-1 block text-sm font-medium" data-tip="Target language for translated text." data-i18n="targetLang">目标语言</span>
            <select id="targetLang" class="w-full border-b border-gray-300 bg-white px-2 py-2 outline-none focus:border-blue-500">
              <option value="chs">简体中文</option>
              <option value="en">English</option>
            </select>
          </label>
        </div>

        <div>
          <div class="mb-2 flex items-center justify-between">
            <h2 class="text-lg font-semibold" data-i18n="configTitle">配置 JSON</h2>
            <button id="resetConfig" class="rounded bg-gray-200 px-3 py-1.5 text-sm hover:bg-gray-300" data-i18n="resetConfig">重载默认配置</button>
          </div>
          <textarea id="settingsJson" class="h-64 w-full resize-y rounded border border-gray-300 bg-slate-50 p-3 font-mono text-sm outline-none focus:border-blue-500"></textarea>
          <p class="mt-2 text-sm text-gray-500" data-i18n="configHint">当前 Rust 版 DeepSeek/OpenAI-compatible 翻译器还未接入，可先用内置翻译器测试完整流程。</p>
        </div>

        <div id="dropZone" class="flex min-h-56 flex-col items-center justify-center rounded border-2 border-dashed border-gray-300 bg-white p-8 text-center">
          <div class="mb-3 text-4xl text-gray-400">⇧</div>
          <p class="mb-4 text-gray-600" data-i18n="dropText">拖入图片，或点击选择文件</p>
          <input id="fileInput" type="file" accept="image/*" class="hidden">
          <button id="pickFile" class="rounded bg-blue-600 px-4 py-2 text-white hover:bg-blue-700" data-i18n="chooseFile">选择图片</button>
        </div>

        <div class="flex items-center gap-3">
          <button id="translateBtn" class="rounded bg-green-600 px-4 py-2 font-medium text-white hover:bg-green-700 disabled:cursor-not-allowed disabled:bg-gray-300" disabled data-i18n="start">开始翻译</button>
          <span id="status" class="text-sm text-gray-600"></span>
        </div>

        <div class="border-t pt-6">
          <div class="mb-3 flex items-center justify-between">
            <h2 class="text-lg font-semibold"><span data-i18n="results">翻译结果</span> (<span id="resultCount">0</span>)</h2>
            <div class="flex gap-2">
              <button id="refreshResults" class="rounded bg-blue-600 px-3 py-1.5 text-sm text-white hover:bg-blue-700" data-i18n="refresh">刷新</button>
              <button id="exportSelected" class="rounded bg-emerald-600 px-3 py-1.5 text-sm text-white hover:bg-emerald-700" data-i18n="export">导出选中</button>
            </div>
          </div>
          <div id="resultsList" class="grid gap-3"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const i18n = {
      zh: {
        title: '图片/漫画翻译器 Rust',
        detector: '检测器',
        ocr: 'OCR',
        targetLang: '目标语言',
        configTitle: '配置 JSON',
        resetConfig: '重载默认配置',
        configHint: '当前 Rust 版 DeepSeek/OpenAI-compatible 翻译器还未接入，可先用内置翻译器测试完整流程。',
        dropText: '拖入图片，或点击选择文件',
        chooseFile: '选择图片',
        start: '开始翻译',
        results: '翻译结果',
        refresh: '刷新',
        export: '导出选中',
        selected: '已选择',
        noResults: '暂无结果',
        translating: '正在翻译...',
        done: '完成',
        exportPrompt: '请输入导出文件夹绝对路径',
        exported: '已导出',
      },
      en: {
        title: 'Manga Image Translator Rust',
        detector: 'Detector',
        ocr: 'OCR',
        targetLang: 'Target Language',
        configTitle: 'Settings JSON',
        resetConfig: 'Reload Defaults',
        configHint: 'DeepSeek/OpenAI-compatible translator is not wired into the Rust version yet. Use built-in translators to test the pipeline first.',
        dropText: 'Drop an image here, or click to choose',
        chooseFile: 'Choose Image',
        start: 'Start Translating',
        results: 'Translation Results',
        refresh: 'Refresh',
        export: 'Export Selected',
        selected: 'selected',
        noResults: 'No results yet',
        translating: 'Translating...',
        done: 'Done',
        exportPrompt: 'Enter absolute output folder path',
        exported: 'Exported',
      }
    };

    let lang = localStorage.getItem('rustMitLang') || 'zh';
    let defaults = null;
    let selectedFile = null;

    const fileInput = document.getElementById('fileInput');
    const translateBtn = document.getElementById('translateBtn');
    const statusEl = document.getElementById('status');
    const settingsEl = document.getElementById('settingsJson');
    const resultsList = document.getElementById('resultsList');

    function t(key) { return i18n[lang][key] || key; }

    function applyLang() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      document.getElementById('langBtn').textContent = lang === 'zh' ? 'English' : '中文';
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function loadDefaults() {
      const res = await fetch('/defaults/settings');
      const data = await res.json();
      settingsEl.value = JSON.stringify(data, null, 2);
      syncControlsFromJson();
    }

    function syncControlsFromJson() {
      try {
        const cfg = JSON.parse(settingsEl.value);
        document.getElementById('detector').value = cfg.detector?.detector || 'DBNet';
        document.getElementById('ocr').value = cfg.ocr?.ocr || 'Ocr48px';
        const target = cfg.translator?.target?.target || 'chs';
        document.getElementById('targetLang').value = target === 'zh' ? 'chs' : target;
      } catch (_) {}
    }

    function patchJsonFromControls() {
      const cfg = JSON.parse(settingsEl.value);
      cfg.detector = cfg.detector || {};
      cfg.ocr = cfg.ocr || {};
      cfg.translator = cfg.translator || {};
      cfg.detector.detector = document.getElementById('detector').value;
      cfg.ocr.ocr = document.getElementById('ocr').value;
      cfg.translator.target = cfg.translator.target || {};
      cfg.translator.target.target = document.getElementById('targetLang').value;
      settingsEl.value = JSON.stringify(cfg, null, 2);
      return cfg;
    }

    function setSelectedFile(file) {
      selectedFile = file;
      translateBtn.disabled = !file;
      setStatus(file ? `${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)` : '');
    }

    async function translate() {
      if (!selectedFile) return;
      let cfg;
      try {
        cfg = patchJsonFromControls();
      } catch (err) {
        setStatus(`JSON error: ${err.message}`);
        return;
      }

      translateBtn.disabled = true;
      setStatus(t('translating'));

      const form = new FormData();
      form.append('file', selectedFile);
      form.append('settings', JSON.stringify(cfg));

      try {
        const res = await fetch('/translate', { method: 'POST', body: form });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        setStatus(`${t('done')}: ${data.file_name}`);
        await refreshResults();
      } catch (err) {
        setStatus(err.message);
      } finally {
        translateBtn.disabled = !selectedFile;
      }
    }

    async function refreshResults() {
      const res = await fetch('/results/list');
      const items = await res.json();
      document.getElementById('resultCount').textContent = items.length;
      resultsList.innerHTML = '';

      if (!items.length) {
        resultsList.innerHTML = `<div class="py-10 text-center text-gray-500">${t('noResults')}</div>`;
        return;
      }

      for (const item of items) {
        const row = document.createElement('label');
        row.className = 'flex items-center gap-3 rounded border border-gray-200 p-3 hover:bg-gray-50';
        row.innerHTML = `
          <input type="checkbox" class="result-check h-4 w-4" value="${item.file_name}">
          <div class="min-w-0 flex-1">
            <div class="truncate font-medium">${item.file_name}</div>
            <div class="text-xs text-gray-500">${new Date(item.modified * 1000).toLocaleString()} · ${(item.size / 1024).toFixed(1)} KB</div>
          </div>
          <a class="rounded bg-gray-900 px-3 py-1.5 text-sm text-white" href="${item.url}" target="_blank">Open</a>
        `;
        resultsList.appendChild(row);
      }
    }

    async function exportSelected() {
      const files = Array.from(document.querySelectorAll('.result-check:checked')).map(v => v.value);
      if (!files.length) {
        setStatus('No result selected');
        return;
      }
      const outputDir = prompt(t('exportPrompt'));
      if (!outputDir) return;

      const res = await fetch('/results/export', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ files, output_dir: outputDir }),
      });
      if (!res.ok) {
        setStatus(await res.text());
        return;
      }
      const data = await res.json();
      setStatus(`${t('exported')}: ${data.copied} -> ${data.output_dir}`);
    }

    document.getElementById('langBtn').addEventListener('click', () => {
      lang = lang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('rustMitLang', lang);
      applyLang();
      refreshResults();
    });
    document.getElementById('pickFile').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => setSelectedFile(e.target.files[0]));
    document.getElementById('dropZone').addEventListener('dragover', e => e.preventDefault());
    document.getElementById('dropZone').addEventListener('drop', e => {
      e.preventDefault();
      setSelectedFile(e.dataTransfer.files[0]);
    });
    document.getElementById('translateBtn').addEventListener('click', translate);
    document.getElementById('refreshResults').addEventListener('click', refreshResults);
    document.getElementById('exportSelected').addEventListener('click', exportSelected);
    document.getElementById('resetConfig').addEventListener('click', loadDefaults);
    ['detector', 'ocr', 'targetLang'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        try { patchJsonFromControls(); } catch (_) {}
      });
    });
    settingsEl.addEventListener('blur', syncControlsFromJson);

    applyLang();
    loadDefaults().catch(err => setStatus(err.message));
    refreshResults().catch(err => setStatus(err.message));
  </script>
</body>
</html>
